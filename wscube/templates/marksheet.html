<!DOCTYPE html>
<html>
<head>
<title>Student Marksheet</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<div class="container mt-5">

<h2 class="text-center">Student Marksheet</h2>

<form method="POST">
{% csrf_token %}

<div class="mb-3">
<label>Name</label>
<input type="text" name="name" class="form-control">
</div>

<div class="mb-3">
<label>Subject 1</label>
<input type="number" name="m1" class="form-control">
</div>

<div class="mb-3">
<label>Subject 2</label>
<input type="number" name="m2" class="form-control">
</div>

<div class="mb-3">
<label>Subject 3</label>
<input type="number" name="m3" class="form-control">
</div>

<div class="mb-3">
<label>Subject 4</label>
<input type="number" name="m4" class="form-control">
</div>

<div class="mb-3">
<label>Subject 5</label>
<input type="number" name="m5" class="form-control">
</div>

<button class="btn btn-primary">Calculate</button>

</form>

<hr>

<h4>Name: {{ name }}</h4>
<h4>Total: {{ total }}</h4>
<h4>Percentage: {{ percentage }}</h4>
<h4>Grade: {{ grade }}</h4>

</div>

</body>
</html>
